name: Build and Package

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build (release)
        run: swift build -c release

      - name: Create .app bundle
        run: |
          APP_NAME="DS4ToolBar"
          APP_DIR="${APP_NAME}.app"
          MACOS_DIR="${APP_DIR}/Contents/MacOS"
          mkdir -p "${MACOS_DIR}"
          cp ".build/release/ds4toolbar" "${MACOS_DIR}/${APP_NAME}"

          cat > "${APP_DIR}/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>${APP_NAME}</string>
              <key>CFBundleIdentifier</key>
              <string>com.aluminumio.ds4toolbar</string>
              <key>CFBundleName</key>
              <string>DwarfStar 4 Toolbar</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF

          codesign --force --deep --sign - "${APP_DIR}"

      - name: Create DMG
        run: |
          DMG_NAME="DS4ToolBar-${GITHUB_REF_NAME:-latest}.dmg"
          STAGING="dmg-staging"
          mkdir -p "${STAGING}"
          cp -R "DS4ToolBar.app" "${STAGING}/"
          ln -s /Applications "${STAGING}/Applications"
          hdiutil create -volname "DS4ToolBar" -srcfolder "${STAGING}" -ov -format UDZO "${DMG_NAME}"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: DS4ToolBar-dmg
          path: "*.dmg"
          retention-days: 30

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: DS4ToolBar-app
          path: "DS4ToolBar.app"
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: DS4ToolBar-dmg
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.dmg
          generate_release_notes: true
